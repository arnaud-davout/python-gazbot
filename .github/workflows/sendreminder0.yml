name: send reminder 0

on:
  schedule:
   - cron: '0 1 31 1,3,5,7,8,10,12 *' # At 01:00 0 day before end of the month
   - cron: '0 1 30 4,6,9,11 *'
   - cron: '0 1 28 2 *'
  workflow_dispatch:

jobs:
  send_reminder_0:
    runs-on: self-hosted
    steps:
      - name: checkout repo content
        uses: actions/checkout@v5 # checkout the repository content

      - name: setup venv
        run: ./venvsetup.sh

      - name: create address file
        env:
          GAZBOT_ADDRESSES: ${{ vars.GAZBOT_ADDRESSES }}
        run: echo "$GAZBOT_ADDRESSES" | tr ';' '\n' > address.txt

      - name: run gazbot
        env:
          GAZBOT_SERVER: ${{ vars.GAZBOT_SERVER }}
          GAZBOT_USERNAME: ${{ vars.GAZBOT_USERNAME }}
          GAZBOT_PASSWORD: ${{ secrets.GAZBOT_PASSWORD }}
          SMTP_SERVER: ${{ vars.SMTP_SERVER }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ vars.SMTP_SENDER }}
        run: |
          source .venv/bin/activate
          python gazbot.py --server $GAZBOT_SERVER --username $GAZBOT_USERNAME --password $GAZBOT_PASSWORD --address address.txt --reminder 0
          
